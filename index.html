<!DOCTYPE html>
<html>
<head>
  <title>Keyflow v0.3</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,190,40,.35), transparent 25%),
        radial-gradient(circle at 80% 80%, rgba(255,130,0,.25), transparent 30%),
        linear-gradient(135deg, #120800, #000);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: white;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -120px;
      background:
        radial-gradient(circle, rgba(255,220,100,.20) 0 2px, transparent 3px);
      background-size: 55px 55px;
      animation: drift 18s linear infinite;
      opacity: .65;
    }

    body::after {
      content: "";
      position: fixed;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,180,40,.22), transparent 68%);
      filter: blur(20px);
      animation: floatGlow 9s infinite alternate ease-in-out;
      z-index: 0;
    }

    @keyframes drift {
      from { transform: translateY(0); }
      to { transform: translateY(90px); }
    }

    @keyframes floatGlow {
      from { left: -120px; top: -80px; }
      to { left: 65%; top: 55%; }
    }

    .particle {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffe98a;
      pointer-events: none;
      animation: pop 0.7s ease-out forwards;
      z-index: 99;
    }

    @keyframes pop {
      to {
        transform: translate(var(--x), var(--y)) scale(0);
        opacity: 0;
      }
    }

    .app {
      position: relative;
      z-index: 2;
      width: 98vw;
      max-width: 1200px;
      display: grid;
      grid-template-columns: 170px 1fr 170px;
      gap: 16px;
      align-items: center;
    }

    .panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .mode-btn {
      height: 92px;
      border: 0;
      border-radius: 24px;
      cursor: pointer;
      font-weight: 1000;
      font-size: 16px;
      color: #2b1600;
      background:
        radial-gradient(circle at 35% 20%, rgba(255,255,255,.65), transparent 30%),
        linear-gradient(145deg, #ffe38a, #c86a00);
      box-shadow:
        inset 0 8px 14px rgba(255,255,255,.35),
        inset 0 -10px 14px rgba(80,25,0,.45),
        0 9px 0 rgba(100,40,0,.9),
        0 18px 28px rgba(0,0,0,.45);
      transition: .1s ease;
    }

    .mode-btn:active {
      transform: translateY(8px) scale(.96);
      box-shadow:
        inset 0 14px 20px rgba(55,15,0,.65),
        0 2px 0 rgba(90,30,0,.95);
    }

    .main { text-align: center; }

    h1 {
      font-size: 46px;
      margin: 0 0 12px;
      letter-spacing: 2px;
      text-shadow: 0 0 25px rgba(255,190,40,.8);
    }

    .hud {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .hud div {
      flex: 1;
      padding: 13px;
      border-radius: 18px;
      background: rgba(255,210,90,.14);
      backdrop-filter: blur(12px);
      font-weight: 900;
    }

    .screen {
      height: 100px;
      margin-bottom: 20px;
      border-radius: 28px;
      background: rgba(255,180,40,.13);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 30px rgba(255,200,80,.25);
      padding: 12px;
    }

    #message {
      font-size: 27px;
      font-weight: 950;
      color: #ffe38a;
      text-shadow: 0 0 20px rgba(255,190,40,.9);
    }

    #keyboard {
      padding: 26px 20px 30px;
      border-radius: 40px;
      background:
        radial-gradient(circle at 30% 12%, rgba(255,255,255,.45), transparent 20%),
        linear-gradient(145deg, rgba(255,210,80,.96), rgba(145,60,0,.98));
      box-shadow:
        inset 0 16px 28px rgba(255,255,255,.28),
        inset 0 -28px 42px rgba(60,20,0,.62),
        0 35px 90px rgba(0,0,0,.75);
    }

    .key-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 11px;
    }

    .middle-row { padding-left: 30px; padding-right: 30px; }
    .bottom-letters { padding-left: 70px; padding-right: 70px; }

    .key {
      width: 60px;
      height: 62px;
      border: 0;
      border-radius: 20px;
      cursor: pointer;
      font-size: 20px;
      font-weight: 1000;
      color: rgba(40,20,0,.86);
      background:
        radial-gradient(circle at 35% 20%, rgba(255,255,255,.7), transparent 28%),
        linear-gradient(145deg, rgba(255,235,135,.98), rgba(205,95,0,.94));
      box-shadow:
        inset 0 10px 14px rgba(255,255,255,.42),
        inset 0 -12px 16px rgba(70,20,0,.48),
        0 10px 0 rgba(95,35,0,.9),
        0 18px 24px rgba(40,10,0,.48);
      transition: .08s ease;
    }

    .key.pressed {
      transform: translateY(9px) scale(.96,.86);
      box-shadow:
        inset 0 16px 24px rgba(55,15,0,.72),
        0 2px 0 rgba(90,30,0,.95);
    }

    .key.target-key { animation: pulse .65s infinite alternate; }
    .key.danger-key { animation: danger .55s infinite alternate; }

    @keyframes pulse {
      from { filter: brightness(1); box-shadow: 0 0 16px #ffe98a, 0 10px 0 rgba(95,35,0,.9); }
      to { filter: brightness(1.25); box-shadow: 0 0 42px #fff2a6, 0 10px 0 rgba(95,35,0,.9); }
    }

    @keyframes danger {
      from { box-shadow: 0 0 14px #ff3b1f, 0 10px 0 rgba(95,35,0,.9); }
      to { box-shadow: 0 0 42px #ff1a00, 0 10px 0 rgba(95,35,0,.9); }
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.72);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 50;
    }

    .modal-box {
      width: 90%;
      max-width: 560px;
      padding: 26px;
      border-radius: 30px;
      background: linear-gradient(145deg, #ffcf5c, #7a3300);
      color: #241000;
      box-shadow: 0 30px 90px rgba(0,0,0,.8);
    }

    .shop-item {
      background: rgba(255,255,255,.22);
      padding: 14px;
      border-radius: 18px;
      margin: 10px 0;
      font-weight: 900;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .buy, .close {
      padding: 10px 14px;
      border: 0;
      border-radius: 14px;
      font-weight: 900;
      cursor: pointer;
      background: #2b1600;
      color: #ffe38a;
    }

    @media (max-width: 900px) {
      body { overflow: auto; padding: 18px 0; }

      .app {
        grid-template-columns: 1fr;
      }

      .panel {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
      }

      .mode-btn {
        width: 46%;
        height: 70px;
      }

      .key {
        width: 33px;
        height: 46px;
        font-size: 12px;
      }

      .key-row { gap: 6px; }
      .middle-row { padding-left: 14px; padding-right: 14px; }
      .bottom-letters { padding-left: 34px; padding-right: 34px; }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="panel left">
      <button class="mode-btn" onclick="setMode('combo')">🍯 Sticky<br>Combo</button>
      <button class="mode-btn" onclick="setMode('words')">🐝 Honey<br>Words</button>
      <button class="mode-btn" onclick="setMode('dont')">🚫 Don’t<br>Press</button>
      <button class="mode-btn" onclick="claimDaily()">🎁 Daily<br>Gift</button>
    </div>

    <div class="main">
      <h1>Keyflow</h1>

      <div class="hud">
        <div>Score: <span id="score">0</span></div>
        <div>Combo: <span id="combo">0</span>x</div>
        <div>Gems: <span id="gems">0</span></div>
        <div>High: <span id="highScore">0</span></div>
      </div>

      <div class="screen">
        <div id="message">press the target key</div>
      </div>

      <div id="keyboard">
        <div class="key-row">
          <button class="key" data-key="Q">Q</button><button class="key" data-key="W">W</button><button class="key" data-key="E">E</button><button class="key" data-key="R">R</button><button class="key" data-key="T">T</button><button class="key" data-key="Y">Y</button><button class="key" data-key="U">U</button><button class="key" data-key="I">I</button><button class="key" data-key="O">O</button><button class="key" data-key="P">P</button>
        </div>
        <div class="key-row middle-row">
          <button class="key" data-key="A">A</button><button class="key" data-key="S">S</button><button class="key" data-key="D">D</button><button class="key" data-key="F">F</button><button class="key" data-key="G">G</button><button class="key" data-key="H">H</button><button class="key" data-key="J">J</button><button class="key" data-key="K">K</button><button class="key" data-key="L">L</button>
        </div>
        <div class="key-row bottom-letters">
          <button class="key" data-key="Z">Z</button><button class="key" data-key="X">X</button><button class="key" data-key="C">C</button><button class="key" data-key="V">V</button><button class="key" data-key="B">B</button><button class="key" data-key="N">N</button><button class="key" data-key="M">M</button>
        </div>
      </div>
    </div>

    <div class="panel right">
      <button class="mode-btn" onclick="setMode('speed')">⚡ Speed<br>Rush</button>
      <button class="mode-btn" onclick="setMode('bee')">🐝 Bee<br>Hunt</button>
      <button class="mode-btn" onclick="mysteryGift()">🎲 Mystery<br>Gift</button>
      <button class="mode-btn" onclick="openShop()">🛒<br>Shop</button>
    </div>
  </div>

  <div class="modal" id="shop">
    <div class="modal-box">
      <h2>🛒 Keyflow Shop</h2>
      <div class="shop-item"><span>Neon Theme</span><button class="buy" onclick="buyItem('Neon Theme',150)">150 Gems</button></div>
      <div class="shop-item"><span>Glass Theme</span><button class="buy" onclick="buyItem('Glass Theme',120)">120 Gems</button></div>
      <div class="shop-item"><span>Golden Sound Pack</span><button class="buy" onclick="buyItem('Golden Sound Pack',200)">200 Gems</button></div>
      <div class="shop-item"><span>Honey Tree Background</span><button class="buy" onclick="buyItem('Honey Tree Background',250)">250 Gems</button></div>
      <p style="font-weight:900;">Mock shop only. No real payments yet.</p>
      <button class="close" onclick="closeShop()">Close</button>
    </div>
  </div>

  <script>
    const SOUND_URL = "https://tmpfiles.org/dl/wwwgU01Ubd7l/universfield-slime-impact-3524731-audiotrimmer.com2.mp3";
    const letters = "QWERTYUIOPASDFGHJKLZXCVBNM".split("");
    const words = ["HONEY", "BEE", "FLOW", "GOLD", "STICKY", "KEY", "BUZZ"];

    const scoreEl = document.getElementById("score");
    const comboEl = document.getElementById("combo");
    const gemsEl = document.getElementById("gems");
    const highScoreEl = document.getElementById("highScore");
    const messageEl = document.getElementById("message");
    const keys = document.querySelectorAll(".key");

    let score = Number(localStorage.getItem("score")) || 0;
    let gems = Number(localStorage.getItem("gems")) || 0;
    let highScore = Number(localStorage.getItem("highScore")) || 0;
    let combo = 0;
    let target = "";
    let mode = "combo";
    let wordTarget = "";
    let wordProgress = "";
    let beeTargets = [];
    let roundStartTime = Date.now();

    scoreEl.textContent = score;
    gemsEl.textContent = gems;
    highScoreEl.textContent = highScore;

    function save() {
      localStorage.setItem("score", score);
      localStorage.setItem("gems", gems);
      localStorage.setItem("highScore", highScore);
    }

    function playSound() {
      const sound = new Audio(SOUND_URL);
      sound.volume = 0.85;
      sound.play();
    }

    function particles() {
      for (let i = 0; i < 12; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.style.left = "50%";
        p.style.top = "50%";
        p.style.setProperty("--x", (Math.random() * 220 - 110) + "px");
        p.style.setProperty("--y", (Math.random() * 220 - 110) + "px");
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 700);
      }
    }

    function pressVisual(keyName) {
      const key = document.querySelector(`[data-key="${keyName}"]`);
      if (!key) return;
      key.classList.add("pressed");
      setTimeout(() => key.classList.remove("pressed"), 110);
    }

    function clearKeys() {
      document.querySelectorAll(".target-key, .danger-key").forEach(k => {
        k.classList.remove("target-key", "danger-key");
      });
    }

    function glow(keyName, type = "target-key") {
      const key = document.querySelector(`[data-key="${keyName}"]`);
      if (key) key.classList.add(type);
    }

    function randomLetter(except = []) {
      let pick;
      do {
        pick = letters[Math.floor(Math.random() * letters.length)];
      } while (except.includes(pick));
      return pick;
    }

    function setMode(newMode) {
      mode = newMode;
      combo = 0;
      comboEl.textContent = combo;
      newRound();
    }

    function newRound() {
      clearKeys();
      roundStartTime = Date.now();

      if (mode === "combo" || mode === "speed") {
        target = randomLetter();
        messageEl.textContent = mode === "speed" ? "SPEED! Hit " + target : "Hit " + target;
        glow(target);
      }

      if (mode === "words") {
        wordTarget = words[Math.floor(Math.random() * words.length)];
        wordProgress = "";
        target = wordTarget[0];
        messageEl.textContent = "Type: " + wordTarget;
        glow(target);
      }

      if (mode === "dont") {
        target = randomLetter();
        messageEl.textContent = "Don't press " + target;
        glow(target, "danger-key");
      }

      if (mode === "bee") {
        beeTargets = [randomLetter(), randomLetter(), randomLetter()];
        messageEl.textContent = "Bee Hunt: " + beeTargets.join(" ");
        beeTargets.forEach(k => glow(k));
      }
    }

    function correct(points = 10) {
      combo++;
      score += points + combo;
      gems += 1;
      if (score > highScore) highScore = score;

      scoreEl.textContent = score;
      comboEl.textContent = combo;
      gemsEl.textContent = gems;
      highScoreEl.textContent = highScore;

      particles();
      save();
    }

    function wrong() {
      combo = 0;
      comboEl.textContent = combo;
      messageEl.textContent = "Miss!";
    }

    function triggerKey(keyName) {
      playSound();
      pressVisual(keyName);

      if (mode === "combo") {
        keyName === target ? correct(10) : wrong();
        newRound();
      }

      else if (mode === "speed") {
        if (keyName === target) {
          const reaction = Date.now() - roundStartTime;
          const bonus = Math.max(5, Math.floor(45 - reaction / 50));
          correct(20 + bonus);
          messageEl.textContent = "Speed bonus +" + bonus;
        } else wrong();
        newRound();
      }

      else if (mode === "dont") {
        keyName === target ? wrong() : correct(6);
        newRound();
      }

      else if (mode === "words") {
        if (keyName === target) {
          wordProgress += keyName;
          correct(12);

          if (wordProgress === wordTarget) {
            score += 40;
            messageEl.textContent = "Word cleared!";
            save();
            newRound();
          } else {
            clearKeys();
            target = wordTarget[wordProgress.length];
            messageEl.textContent = wordProgress + " / " + wordTarget;
            glow(target);
          }
        } else {
          wrong();
          newRound();
        }
      }

      else if (mode === "bee") {
        if (beeTargets.includes(keyName)) {
          correct(12);
          beeTargets = beeTargets.filter(k => k !== keyName);
          clearKeys();
          beeTargets.forEach(k => glow(k));

          if (beeTargets.length === 0) {
            score += 50;
            messageEl.textContent = "Bee Hunt cleared!";
            save();
            newRound();
          } else {
            messageEl.textContent = "Bees left: " + beeTargets.join(" ");
          }
        } else {
          wrong();
          newRound();
        }
      }
    }

    keys.forEach(key => {
      key.addEventListener("click", () => triggerKey(key.dataset.key));
    });

    document.addEventListener("keydown", event => {
      const key = event.key.toUpperCase();
      if (/^[A-Z]$/.test(key)) triggerKey(key);
    });

    function claimDaily() {
      const today = new Date().toDateString();
      const last = localStorage.getItem("daily");

      if (last === today) {
        messageEl.textContent = "Daily gift already claimed!";
        return;
      }

      gems += 50;
      localStorage.setItem("daily", today);
      gemsEl.textContent = gems;
      messageEl.textContent = "Daily gift: +50 gems!";
      save();
    }

    function mysteryGift() {
      const reward = Math.floor(Math.random() * 41) + 10;
      gems += reward;
      gemsEl.textContent = gems;
      messageEl.textContent = "Mystery gift: +" + reward + " gems!";
      save();
    }

    function buyItem(name, cost) {
      if (gems < cost) {
        messageEl.textContent = "Not enough gems for " + name;
        return;
      }

      gems -= cost;
      gemsEl.textContent = gems;
      messageEl.textContent = "Unlocked: " + name;
      save();
    }

    function openShop() {
      document.getElementById("shop").style.display = "flex";
    }

    function closeShop() {
      document.getElementById("shop").style.display = "none";
    }

    newRound();
  </script>
</body>
</html>
